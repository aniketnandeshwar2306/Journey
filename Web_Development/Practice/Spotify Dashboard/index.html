<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body> 

    <div class="page">
        <div class="left">
            <div class="logo">
                <img id="log" src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/74/Spotify_App_Logo.svg/960px-Spotify_App_Logo.svg.png?_=20210620075506" alt="spotify">
            </div>
            <div class="dash">
                <div class="home">
                <img id="hom" src="https://img.icons8.com/?size=100&id=2797&format=png&color=FFFFFF" alt="Home"> Home
                </div>
                <div class="search1">
                <img id="srch1" src="https://img.icons8.com/?size=100&id=132&format=png&color=FFFFFF" alt="search"> Search
                </div>
                <div class="playlist">
                    <img id="plylist" src="https://img.icons8.com/?size=100&id=113920&format=png&color=FFFFFF" alt="playlist"> Your Playlist
                </div>
            </div>
            <div class="function1">
                <h6 id="recent">Recent</h6>
                <h4 class="song1"> <img id="sng1" src="https://c.saavncdn.com/598/Saiyaara-Hindi-2025-20250703061754-500x500.jpg" alt="saiyara"> Saiyaara <br> Saiyaara by Tanishk Bagchi. <br> 6:10 </h4>
                <h4 class="song2"> <img id="sng2" src="https://c.saavncdn.com/560/Bin-Tere-Sanam-Sped-Up-Hindi-2024-20240214121259-500x500.jpg" alt="">Bin Tere Sanam <br> Bin Tere Sanam by Udit Narayan. <br> 3:46 </h4>
            </div>
            <div class="line">
            </div>
            <div class="function2">
                <h4>Recent Album</h4>
                <h4>Join Premium</h4>
            </div>
        </div>
        <div class="mid">
            <div class="hero">
                <div class="lefty">
                    <div class="arrows">
                        <div class="arrow1">
                            <img id="ar1" src="https://img.icons8.com/?size=100&id=1806&format=png&color=FFFFFF" alt="left arrow">
                        </div>
                        <div class="arrow2">
                            <img id="ar2" src="https://img.icons8.com/?size=100&id=61&format=png&color=FFFFFF" alt="right arrow">
                        </div>
                    </div>
                    <div class="search2">
                        <img id="srch2" src="https://img.icons8.com/?size=100&id=132&format=png&color=FFFFFF" alt="search">
                            <input id="searchbar" type="text">
                    </div>
                </div>
                <div class="righty">
                    <div class="albo">
                        Album song Icon
                    </div>
                    <div class="bell">
                        bell
                    </div>
                    <div class="more">
                        more
                    </div>
                </div>
            </div>
        </div>
        <div class="right">

        </div>
    </div>
</body>
</html>
