<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <nav>
        <a href="/" aria-current="page">Home</a>
        </nav>
        <h1>Number Guessing Game</h1>
        <h3>Try and guess number between 1 and 100</h3>
        <h3>You have 10 Attempts to guess the right answer</h3>
        <form>
            <div class="heading">Guess a Number</div>
            <div class="wrapper"><input type="text"></div>
            <div class="submit"><input type="submit" value="Submit Guess"></div>
        </form>
        <div class="result">
            <h4 class="prev">Previous Guess : </h4>
            <h4 class="remain">Guess Remaining : </h4>
            <h4 class="lowhigh">Low or High</h4>
        </div>



        <script src="script.js"></script>
</body>
</html>
